<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0010"/>
      <stop offset="100%" stop-color="#08080e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff0040" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff0040" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff0040"/>
      <stop offset="100%" stop-color="#cc0033"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="44" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#ff0040" stroke-width="0.6" opacity="0.12">
    <line x1="0"   y1="64"  x2="256" y2="64"/>
    <line x1="0"   y1="128" x2="256" y2="128"/>
    <line x1="0"   y1="192" x2="256" y2="192"/>
    <line x1="64"  y1="0"   x2="64"  y2="256"/>
    <line x1="128" y1="0"   x2="128" y2="256"/>
    <line x1="192" y1="0"   x2="192" y2="256"/>
  </g>

  <!-- Outer ring glow -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#ff0040" stroke-width="1.5" opacity="0.25"/>
  <circle cx="128" cy="128" r="92"  fill="none" stroke="#ff0040" stroke-width="0.8" opacity="0.15"/>

  <!-- Glow blob -->
  <circle cx="128" cy="128" r="90" fill="url(#glow)"/>

  <!-- Border glow ring -->
  <rect width="256" height="256" rx="44" fill="none" stroke="#ff0040" stroke-width="2" opacity="0.5"/>

  <!-- V letterform -->
  <text x="128" y="168"
        font-family="Consolas, 'Courier New', monospace"
        font-size="120"
        font-weight="700"
        text-anchor="middle"
        fill="url(#text_grad)"
        letter-spacing="-4">V</text>

  <!-- Bottom label -->
  <text x="128" y="218"
        font-family="Consolas, 'Courier New', monospace"
        font-size="18"
        font-weight="700"
        text-anchor="middle"
        fill="#ff0040"
        opacity="0.7"
        letter-spacing="8">ORTEX</text>
</svg>
